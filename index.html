<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Sensi Generator Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#111827;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px #00ffff55;
}

h1{
color:#00ffff;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:15px;
}

button{
background:#00ffff;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:10px;
text-align:left;
white-space:pre-line;
}

.copy{
background:#22c55e;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 FF SENSI GENERATOR PRO 🔥</h1>

<select id="device">
<option>Xiaomi Redmi 10C</option>
<option>Xiaomi Redmi 12</option>
<option>POCO X3 Pro</option>
<option>Samsung A14</option>
<option>Samsung A15</option>
<option>Infinix Hot 40</option>
<option>Tecno Spark 20</option>
<option>ZTE Blade A36</option>
<option>iPhone 11</option>
<option>iPhone 12</option>
<option>iPhone 13</option>
<option>iPhone 14</option>
<option>iPhone 15</option>
</select>

<select id="fps">
<option>30 FPS</option>
<option>60 FPS</option>
<option>90 FPS</option>
<option>120 FPS</option>
</select>

<select id="dpi">
<option value="no">Sin DPI</option>
<option value="si">Con DPI</option>
</select>

<button onclick="generar()">🔥 Generar Sensibilidad</button>

<div class="result" id="res">Selecciona opciones</div>

<button class="copy" onclick="copiar()">📋 Copiar Resultado</button>

</div>

<script>

let texto="";

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generar(){

let device=document.getElementById("device").value;
let fps=document.getElementById("fps").value;
let dpiMode=document.getElementById("dpi").value;

let dpi = dpiMode==="si" ? rand(520,720) : "No usado";

let base = device.includes("iPhone") ? 95 : 98;

let general = rand(base-3,100);
let red = rand(base-8,100);
let x2 = rand(80,95);
let x4 = rand(70,85);
let awm = rand(20,45);
let libre = rand(80,100);
let boton = rand(45,65);

texto=
`📱 Dispositivo: ${device}
⚡ FPS: ${fps}
🎯 DPI: ${dpi}

🔥 General: ${general}
🎯 Punto Rojo: ${red}
🔭 2X: ${x2}
🔭 4X: ${x4}
🎯 AWM: ${awm}
📷 Libre: ${libre}
🔫 Botón: ${boton}%`;

document.getElementById("res").innerText=texto;
}

function copiar(){
navigator.clipboard.writeText(texto);
alert("Copiado!");
}

</script>

</body>
</html>
